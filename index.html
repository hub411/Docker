<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Xime Chibi Bailando 🎧</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;
    background:linear-gradient(
        180deg,
        #00172d,
        #002d62,
        #000814
    );
    font-family:Arial,sans-serif;
}

/* Luces de fondo */

body::before,
body::after{
    content:"";
    position:absolute;
    width:350px;
    height:350px;
    border-radius:50%;
    filter:blur(90px);
}

body::before{
    background:#00bfff;
    top:-100px;
    left:-100px;
}

body::after{
    background:#ff4fd8;
    bottom:-100px;
    right:-100px;
}

/* PERSONAJE */

.chibi{
    position:relative;
    width:280px;
    animation:bailar .55s infinite alternate ease-in-out;
}

@keyframes bailar{
    0%{
        transform:translateY(0px) rotate(-4deg);
    }
    100%{
        transform:translateY(-12px) rotate(4deg);
    }
}

/* CABEZA */

.cabeza{
    width:140px;
    height:140px;
    background:#ffd7b5;
    border-radius:50%;
    margin:auto;
    position:relative;
    z-index:5;
    animation:cabecear .35s infinite alternate;
}

@keyframes cabecear{
    from{
        transform:rotate(-8deg);
    }
    to{
        transform:rotate(8deg);
    }
}

/* CABELLO LARGO ONDULADO */

.cabello{
    position:absolute;
    width:180px;
    height:230px;
    background:#3b2414;
    left:50%;
    top:-15px;
    transform:translateX(-50%);
    border-radius:90px 90px 60px 60px;
    z-index:1;
}

/* Fleco */

.fleco{
    position:absolute;
    width:120px;
    height:55px;
    left:50%;
    top:0;
    transform:translateX(-50%);
}

.fleco span{
    position:absolute;
    background:#3b2414;
    border-radius:0 0 30px 30px;
}

.f1{
    width:30px;
    height:45px;
    left:5px;
}

.f2{
    width:35px;
    height:55px;
    left:28px;
}

.f3{
    width:35px;
    height:60px;
    left:55px;
}

.f4{
    width:30px;
    height:50px;
    left:85px;
}

/* Ondas del cabello */

.onda1,
.onda2,
.onda3,
.onda4,
.onda5,
.onda6{
    position:absolute;
    background:#3b2414;
    border-radius:50%;
}

.onda1{
    width:45px;
    height:45px;
    left:-10px;
    bottom:10px;
}

.onda2{
    width:38px;
    height:38px;
    left:15px;
    bottom:-5px;
}

.onda3{
    width:40px;
    height:40px;
    left:35px;
    bottom:10px;
}

.onda4{
    width:40px;
    height:40px;
    right:35px;
    bottom:10px;
}

.onda5{
    width:38px;
    height:38px;
    right:15px;
    bottom:-5px;
}

.onda6{
    width:45px;
    height:45px;
    right:-10px;
    bottom:10px;
}

/* Audífonos */

.audifonos{
    position:absolute;
    width:180px;
    height:180px;
    border:10px solid #ff69b4;
    border-bottom:none;
    border-radius:100px 100px 0 0;
    left:50%;
    top:-40px;
    transform:translateX(-50%);
    z-index:10;
}

.audifonos::before,
.audifonos::after{
    content:"";
    position:absolute;
    width:28px;
    height:50px;
    background:#ff69b4;
    top:75px;
    border-radius:20px;
}

.audifonos::before{
    left:-14px;
}

.audifonos::after{
    right:-14px;
}

/* Ojos */

.ojo{
    position:absolute;
    width:28px;
    height:38px;
    background:black;
    border-radius:50%;
    top:48px;
}

.ojo::after{
    content:"";
    position:absolute;
    width:10px;
    height:10px;
    background:white;
    border-radius:50%;
    top:5px;
    left:6px;
}

.izq{
    left:30px;
}

.der{
    right:30px;
}

/* Mejillas */

.mejilla{
    position:absolute;
    width:20px;
    height:12px;
    background:#ff9db6;
    border-radius:50%;
    top:88px;
}

.m1{
    left:18px;
}

.m2{
    right:18px;
}

/* Boca */

.boca{
    position:absolute;
    width:18px;
    height:10px;
    border-bottom:3px solid black;
    border-radius:0 0 20px 20px;
    left:50%;
    top:88px;
    transform:translateX(-50%);
}

/* Sudadera */

.cuerpo{
    width:95px;
    height:90px;
    background:#ff69b4;
    margin:auto;
    border-radius:25px 25px 15px 15px;
    position:relative;
    z-index:4;
}

/* Falda */

.falda{
    width:110px;
    height:55px;
    background:#6a5acd;
    margin:auto;
    margin-top:-5px;
    clip-path:polygon(
        5% 0%,
        95% 0%,
        100% 100%,
        0% 100%
    );
    position:relative;
    z-index:5;
}
/* Brazos */

.brazo{
    position:absolute;
    width:18px;
    height:75px;
    background:#ffd7b5;
    border-radius:20px;
}

.izquierdo{
    left:65px;
    top:145px;
    transform:rotate(40deg);
    animation:brazoBaile1 .4s infinite alternate;
}

.derecho{
    right:65px;
    top:145px;
    transform:rotate(-40deg);
    animation:brazoBaile2 .4s infinite alternate;
}

@keyframes brazoBaile1{
    from{
        transform:rotate(20deg);
    }
    to{
        transform:rotate(55deg);
    }
}

@keyframes brazoBaile2{
    from{
        transform:rotate(-20deg);
    }
    to{
        transform:rotate(-55deg);
    }
}

/* Piernas */

.pierna{
    position:absolute;
    width:18px;
    height:75px;
    background:#ffd7b5;
    border-radius:20px;
    top:335px;
}

.p1{
    left:118px;
    animation:pierna1 .35s infinite alternate;
}

.p2{
    left:145px;
    animation:pierna2 .35s infinite alternate;
}

@keyframes pierna1{
    from{
        transform:rotate(-8deg);
    }
    to{
        transform:rotate(8deg);
    }
}

@keyframes pierna2{
    from{
        transform:rotate(8deg);
    }
    to{
        transform:rotate(-8deg);
    }
}

/* Tenis */

.tenis{
    position:absolute;
    width:34px;
    height:15px;
    background:white;
    border-radius:20px;
    top:405px;
}

.t1{
    left:110px;
}

.t2{
    left:137px;
}

/* Celular */

.celular{
    position:absolute;
    width:50px;
    height:85px;
    background:#111;
    border-radius:10px;
    border:2px solid #555;
    right:10px;
    top:180px;
}

.pantalla{
    color:#00ff66;
    text-align:center;
    font-size:6px;
    padding-top:8px;
}

.barra{
    width:32px;
    height:4px;
    background:#444;
    margin:auto;
    margin-top:6px;
}

.progreso{
    height:100%;
    background:#00ff66;
    animation:musica 2.5s linear infinite;
}

@keyframes musica{
    from{
        width:0%;
    }
    to{
        width:100%;
    }
}

/* Notas musicales */

.nota{
    position:absolute;
    color:white;
    font-size:32px;
    animation:subir 2s infinite;
}

.n1{
    left:-20px;
    top:90px;
}

.n2{
    right:-20px;
    top:70px;
    animation-delay:1s;
}

.n3{
    left:50%;
    top:-20px;
    animation-delay:.5s;
}

@keyframes subir{
    from{
        opacity:1;
        transform:translateY(0);
    }
    to{
        opacity:0;
        transform:translateY(-130px);
    }
}

.titulo{
    position:absolute;
    width:100%;
    text-align:center;
    color:white;
    bottom:-130px;
    font-size:20px;
    font-weight:bold;
}

</style>
</head>
<body>

<div class="chibi">

    <div class="nota n1">🎵</div>
    <div class="nota n2">🎶</div>
    <div class="nota n3">🎵</div>

    <div class="cabello">

       <div class="fleco">
    <span class="f1"></span>
    <span class="f2"></span>
    <span class="f3"></span>
    <span class="f4"></span>
</div>

        <div class="onda1"></div>
        <div class="onda2"></div>
        <div class="onda3"></div>
        <div class="onda4"></div>
        <div class="onda5"></div>
        <div class="onda6"></div>

    </div>

    <div class="audifonos"></div>

    <div class="cabeza">
        <div class="ojo izq"></div>
        <div class="ojo der"></div>

        <div class="mejilla m1"></div>
        <div class="mejilla m2"></div>

        <div class="boca"></div>
    </div>

    <div class="cuerpo"></div>
    <div class="falda"></div>

    <div class="brazo izquierdo"></div>
    <div class="brazo derecho"></div>

    <div class="pierna p1"></div>
    <div class="pierna p2"></div>

    <div class="tenis t1"></div>
    <div class="tenis t2"></div>

    <div class="celular">
        <div class="pantalla">
            🎵 PLAY
            <br><br>
            Xime Mix
            <br><br>

            <div class="barra">
                <div class="progreso"></div>
            </div>
        </div>
    </div>

    <div class="titulo">
        🎧 Xime Chibi Bailando 🎧
    </div>
</div>
</body>
</html>
