<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <style>
        :root {
            --azul-claro: #e3f2fd;
            --azul-acento: #2196f3;
            --azul-oscuro: #1565c0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f4f8;
        }

        .calendario {
            width: 300px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            overflow: hidden;
            border: 1px solid #d1e3f8;
        }

        .cabecera {
            background-color: var(--azul-claro);
            color: var(--azul-oscuro);
            text-align: center;
            padding: 20px;
        }

        .cabecera h2 {
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 1.5rem;
        }

        .cabecera p {
            margin: 5px 0 0;
            font-weight: bold;
            opacity: 0.8;
        }

        .cuerpo {
            padding: 15px;
        }

        .dias-semana {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            text-align: center;
            font-weight: bold;
            color: var(--azul-acento);
            font-size: 0.8rem;
            margin-bottom: 10px;
        }

        .fechas {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            text-align: center;
        }

        .dia {
            padding: 10px 0;
            font-size: 0.9rem;
            color: #444;
        }

        .vacio {
            background: transparent;
        }

        .hoy {
            background-color: var(--azul-acento);
            color: white;
            border-radius: 50%;
            font-weight: bold;
        }
