<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Muñequita Saludando</title>

<style>
body{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:#f0f8ff;
}

.muneca{
    position:relative;
    width:120px;
    height:250px;
}

.cabeza{
    width:80px;
    height:80px;
    background:#87CEFA;
    border-radius:50%;
    margin:auto;
}

.cuerpo{
    width:60px;
    height:90px;
    background:#87CEFA;
    margin:auto;
    border-radius:15px;
}

.brazo-izq{
    position:absolute;
    width:15px;
    height:80px;
    background:#87CEFA;
    top:85px;
    left:15px;
    border-radius:10px;
    transform:rotate(20deg);
}

.brazo-der{
    position:absolute;
    width:15px;
    height:80px;
    background:#87CEFA;
    top:55px;
    right:15px;
    border-radius:10px;
    transform-origin:top center;
    animation:saludar 1s infinite alternate;
}

.pierna-izq,
.pierna-der{
    position:absolute;
    width:15px;
    height:80px;
    background:#87CEFA;
    top:170px;
    border-radius:10px;
}

.pierna-izq{ left:45px; }
.pierna-der{ right:45px; }

@keyframes saludar{
    from{
        transform:rotate(-40deg);
    }
    to{
        transform:rotate(-80deg);
    }
}
</style>
</head>

<body>

<div class="muneca">
    <div class="cabeza"></div>
    <div class="cuerpo"></div>
    <div class="brazo-izq"></div>
    <div class="brazo-der"></div>
    <div class="pierna-izq"></div>
    <div class="pierna-der"></div>
</div>

</body>
</html>
